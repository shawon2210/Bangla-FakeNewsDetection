# Configuration file for Bangla Fake News Detection Model

# Model Configuration
model:
  text_model_name: "csebuetnlp/banglabert"
  num_classes: 2
  text_feature_dim: 512
  image_feature_dim: 512
  fusion_dim: 512        # Increased for better fusion
  dropout_rate: 0.15     # Reduced dropout for better learning
  freeze_text_layers: 2  # Fewer frozen layers
  freeze_image_layers: 1 # Fewer frozen layers

# Training Configuration
training:
  batch_size: 8  # Reduced for stability
  epochs: 15     # Increased for better convergence
  # Optimized learning rates for better accuracy
  text_lr: 2e-5  # Slightly higher for better text learning
  image_lr: 1e-4 # Higher for image features
  other_lr: 5e-4 # Higher for fusion layers
  weight_decay: 0.01
  warmup_ratio: 0.15  # Longer warmup
  max_grad_norm: 1.0

# Early Stopping
early_stopping:
  patience: 10   # More patience for better convergence
  min_delta: 0.0005  # Smaller delta for fine-tuning
  restore_best_weights: true

# Data Configuration
data:
  max_text_length: 128
  image_size: 224
  image_folder: "images"
  train_csv: "Train.csv"
  val_csv: "Validation.csv"
  test_csv: "Test.csv"

# Logging and Checkpoints
logging:
  log_dir: "runs"
  checkpoint_dir: "checkpoints"
  save_every: 5
  model_save_path: "outputs/best_multimodal_model.pth"
  multimodal_detector_v1_path: "multimodal_detector_v1.pth"

# Inference Configuration
inference:
  batch_size: 32
  confidence_threshold: 0.5
  max_inference_time: 5.0

# Evaluation Configuration
evaluation:
  metrics:
    - accuracy
    - precision
    - recall
    - f1_score
    - roc_auc
    - average_precision
  plot_confusion_matrix: true
  plot_roc_curve: true
  plot_pr_curve: true
  plot_class_metrics: true

# Hardware Configuration
hardware:
  device: "auto"  # auto, cuda, cpu
  num_workers: 4
  pin_memory: false  # Set to false for CPU-only runs to suppress DataLoader warning
  mixed_precision: true

# Research Configuration
research:
  ablation_studies:
    text_only: false
    image_only: false
    attention_heads: [4, 8, 16]
    fusion_methods: ["concat", "attention", "bilinear"]
  
  hyperparameter_tuning:
    enabled: true
    method: "optuna"  # optuna, ray, grid
    n_trials: 20  # Reduce for quick test, increase for full search
  
  feature_analysis:
    extract_features: true
    save_features: false
    feature_path: "features"

# Deployment Configuration
deployment:
  api_server: "flask"  # flask, fastapi
  host: "0.0.0.0"
  port: 8000
  workers: 1
  max_request_size: "16MB"
